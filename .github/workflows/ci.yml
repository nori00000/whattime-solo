name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts reads DATABASE_URL eagerly at load time (needed by
      # `prisma generate` and `next build`'s type check). No real database is
      # used in CI; this placeholder only satisfies config loading.
      DATABASE_URL: postgresql://user:password@localhost:5433/whattime_solo_ci
      # src/lib/availability/engine.ts builds working hours from the *process*
      # system timezone (date-fns startOfDay/set), not from APP_TIMEZONE - see
      # docs/current-status.md "Risks". Pin CI to the app's documented default
      # (Asia/Seoul) so results match local dev instead of the GitHub runner's UTC.
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
